</span> </div> <div id="terminal-host" class="terminal-body h-[460px] md:h-[560px] overflow-y-auto px-4 py-3 font-mono text-sm" data-posts="[{&#34;slug&#34;:&#34;crypto-wp-3&#34;,&#34;title&#34;:&#34;密码机一小题&#34;,&#34;description&#34;:&#34;题出自2025熵密杯Flag3，主要学习一下密码机的调用方式以及CFB相关的一些利用方式&#34;,&#34;pubDate&#34;:&#34;2026-06-30T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;writeup&#34;,&#34;wp&#34;,&#34;熵密杯&#34;],&#34;body&#34;:&#34;> 本题复现使用密码机为公司内部密码机，源码经过改造，数据也重新生成，因此和原题有出入。\r\n\r\n题目\r\n```c\r\n#include <stdlib.h>\r\n#include <stdio.h>\r\n#include <string.h>\r\n#include <time.h>\r\n//#include \&#34;sdf_cryptoapi.h\&#34;\r\n#include \&#34;bjcaErr.h\&#34;\r\n#include \&#34;bjcaSDF.h\&#34;\r\n#include \&#34;sgd_def.h\&#34;\r\n\r\nvoid *devHandle = NULL;\r\nvoid *sessionHandle = NULL;\r\nvoid *keyHandle = NULL;\r\n\r\nconst unsigned char encrypt_key_hex[] = \&#34;10ad014163a8cc6c864a2f0aa47983ba9b46dac3a3ecfbe9b03344d4bc52c081\&#34;;\r\n\r\nint open_session() {\r\n    int ret = 0;\r\n\r\n    //打开设备\r\n    //ret = SDF_OpenDeviceWithPath(\&#34;./sdt_hsmcrypt.conf\&#34;, &#38;devHandle);\r\n\tret = SDF_OpenDevice(&#38;devHandle);\r\n    if (ret) {\r\n        printf(\&#34;SDF_OpenDeviceWithPath error, ret=%08x\\n\&#34;, ret);\r\n        return ret;\r\n    }\r\n\r\n    //打开会话\r\n    ret = SDF_OpenSession(devHandle, &#38;sessionHandle);\r\n    if (ret) {\r\n        printf(\&#34;SDF_OpenSession error, ret=%08x\\n\&#34;, ret);\r\n        SDF_CloseDevice(devHandle);\r\n        return ret;\r\n    }\r\n    return ret;\r\n}\r\n\r\nint hex_string_to_char_array(const char *hex, unsigned char *out) {\r\n    size_t hex_len = strlen(hex);\r\n    if (hex_len % 2 != 0) return -1; // 奇数长度报错\r\n\r\n    for (size_t i = 0; i < hex_len; i += 2) {\r\n        unsigned int byte;\r\n        if (sscanf(hex + i, \&#34;%2X\&#34;, &#38;byte) != 1) return -1; // 解析失败\r\n        out[i / 2] = (unsigned char) byte;\r\n    }\r\n    return hex_len / 2; // 返回转换后的字节数\r\n}\r\n\r\nint import_key() {\r\n    int ret = 0;\r\n\r\n    unsigned char encrypt_key[128] = {'\\0'};\r\n    const unsigned int key_len = 16;\r\n    const int inner_key_index = 1;\r\n    ret = hex_string_to_char_array(encrypt_key_hex, encrypt_key);\r\n    if (ret < 0) {\r\n        printf(\&#34;hex_string_to_char_array error, ret=%08x\\n\&#34;, ret);\r\n        return ret;\r\n    }\r\n\tprintf(\&#34;encrypt_key:%s\\n\&#34;, encrypt_key);\r\n\tfor(int i=0; i<32; i++)\r\n\t{\r\n\t\tprintf(\&#34;%02x\&#34;, encrypt_key[i]);\r\n\t}\r\n\tprintf(\&#34;\\n\&#34;);\r\n\t\r\n\tret = SDF_ImportKeyWithKEK(sessionHandle, SGD_SM4_ECB, inner_key_index, encrypt_key, 32, &#38;keyHandle);\r\n\t//ret = SDF_ImportKeyWithKEK(sessionHandle, SGD_SM4, inner_key_index, encrypt_key, key_len, &#38;keyHa&#34;},{&#34;slug&#34;:&#34;learn-crypto-2&#34;,&#34;title&#34;:&#34;web手从0学习密码的故事-2 加密模式&#34;,&#34;description&#34;:&#34;关于常见对称分组加密的加密方式以及对应的常见攻击手法&#34;,&#34;pubDate&#34;:&#34;2026-06-24T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;math&#34;],&#34;body&#34;:&#34;## 加密模式\r\n\r\n### ECB 模式\r\n\r\nECB（Electronic Codebook，电子密码本）模式是最基础、最简单的块密码加密模式。\r\n\r\n**加密流程：**\r\n\r\n- 将明文分成固定长度的块 $P_1, P_2, \\dots, P_q$\r\n- 每个明文块使用相同的密钥 $K$ 独立加密\r\n- 加密公式：$C_i = E_K(P_i)$\r\n- 各分组之间完全独立、互不影响\r\n- 最终密文为：$C = C_1 \\| C_2 \\| \\dots \\| C_q$\r\n\r\n![image-20260624093519409](./assets/learn-crypto-2/image-20260624093519409.png)\r\n\r\n**解密流程：**\r\n\r\n- 将密文分成等长的块 $C_1, C_2, \\dots, C_q$\r\n- 每个密文块使用相同的密钥 $K$ 独立解密\r\n- 解密公式：$P_i = D_K(C_i)$\r\n- 各分组之间完全独立，可并行处理\r\n\r\n![image-20260624093527003](./assets/learn-crypto-2/image-20260624093527003.png)\r\n\r\n**ECB 模式特点：**\r\n\r\n- 简单直接：每个明文块独立加密，像查字典一样\r\n- 确定性：相同密钥下，相同明文块总是产生相同密文块（最大缺陷）\r\n- 可并行化：各块独立，可并行加密/解密\r\n- 不适合加密长消息或含重复模式的数据（如图片）\r\n\r\n#### ECB 块重排攻击\r\n\r\n在块加密中ECB模式中每个块都是独立加密的。因此攻击者可以在未知密钥的情况下，对密文中的块进行重新排列，组合成合法的可解密的新密文。\r\n例如，现在有一个cookie：\r\n\r\n```\r\nadmin=0;username=test123\r\n```\r\n\r\n假设块字节大小是8字节，那么明文就能拆分成三块\r\n\r\n```\r\nadmin=0;\r\nusername\r\n=test123\r\n```\r\n\r\n那么现在我们需要把admin变成1使其越权\r\n那么我们就可以通过构造用户名来得到admin=1的块，然后替换掉第一块即可，比如\r\n\r\n```\r\nadmin=0;username=test123admin=1;\r\n```\r\n\r\n那么拆分成块得到\r\n\r\n```\r\nadmin=0;\r\nusername\r\n=test123\r\nadmin=1;\r\n```\r\n\r\n我们就得到了admin=1的密文，替换掉第一个密文即可越权成为admin\r\n\r\n#### ECB 字节频率统计 / 已知明文攻击\r\n\r\nECB 模式最大的缺陷是确定性：相同的明文块在同一密钥下必定产生相同的密文块。攻击者可以利用这一特性进行统计或已知明文分析。\r\n\r\n**示例 —— 加密 Tux 图像：**\r\n\r\n![image-20260624094014339](./assets/learn-crypto-2/image-20260624094014339.png)\r\n\r\n假设原始企鹅图像包含大片相同颜色的背景。加密后：\r\n\r\n```\r\n原始位图（明文块）：    加密后（密文块）：\r\n[黑][黑][黑][黑][轮廓]  →  [C1][C1][C1][C1][C5]\r\n[黑][黑][黑][轮廓][轮廓] →  [C1][C1][C5][C5][C5]\r\n```\r\n\r\n观察密文就能还原出企鹅轮廓，完全不需要密钥。\r\n\r\n\r\n\r\n已知明文攻击示例 —— 网站 cookie 模板：\r\n\r\n假设服务器对固定格式 `user=XXX;role=user` 进行 ECB 加密（块大小 8 字节）：\r\n\r\n```\r\n明文：    user=Alc;role=user\r\n分块：    user=Alc | ;role=us | er????\r\n密文：    abcdef01 | 12345678 | 9abcdef0\r\n```\r\n\r\n攻击者已知前两块的明文内容后，可以构造任意相同前缀的明文，再观察对应密文即可推断第三块内容。例如注册 `user=Alc;role=admin` 时第三块密文如果变为 `fedcba98`，即可推断该块对应 `admin??` 的密文。\r\n\r\n### CBC 模式\r\n\r\nCBC（Cipher Block Chaining，密码分组链接）模式通过引入\&#34;链接\&#34;机制解决了ECB的安全性问题。\r\n\r\n**加密流程：**\r\n\r\n- 使用初始化向量 $IV$ 启动加密过程\r\n- 每个明文块先与前一个密文块异或，再进行加密\r\n- 第一块：$C_1 = E_K(P_1 \\oplus IV)$\r\n- 后续块：$C_i = E_K(P_i \\oplus C_{i-1})$\r\n- 加密&#34;},{&#34;slug&#34;:&#34;crypto-wp-2&#34;,&#34;title&#34;:&#34;关于CBC-MAC长度扩展一小题复现&#34;,&#34;description&#34;:&#34;题出自2023熵密杯初始谜题，不是很难，但是还是思考了好一会，还是理解不够深&#34;,&#34;pubDate&#34;:&#34;2026-06-23T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;writeup&#34;,&#34;wp&#34;,&#34;熵密杯&#34;],&#34;body&#34;:&#34;题目\r\n\r\n```\r\n-----------------------------------------------------\r\nMSG1:\r\ne55e3e24a3ae7797808fdca05a16ac15eb5fa2e6185c23a814a35ba32b4637c2\r\nMAC1:\r\n0712c867aa6ec7c1bb2b66312367b2c8\r\n\r\n-----------------------------------------------------\r\nMSG2:\r\nd8d94f33797e1f41cab9217793b2d0f02b93d46c2ead104dce4bfec453767719\r\nMAC2:\r\n43669127ae268092c056fd8d03b38b5b\r\n\r\n-----------------------------------------------------\r\n请输入您的MSG3(64字节，128个Hex，不要添加空格！)(Please input your 64bytes MSG3(64 bytes,128 hexs,don't using space)):\r\n\r\n请输入您的MAC3(Please input your MAC3):\r\n```\r\n\r\n有两组消息和对应 MAC(共两块，每块 16 bytes)：\r\n\r\n```\r\nMSG1:\r\ne55e3e24a3ae7797808fdca05a16ac15    //p1\r\neb5fa2e6185c23a814a35ba32b4637c2    //p2\r\n\r\nMAC1:\r\n0712c867aa6ec7c1bb2b66312367b2c8    //C2\r\n\r\nMSG2:\r\nd8d94f33797e1f41cab9217793b2d0f0    //p3\r\n2b93d46c2ead104dce4bfec453767719    //p4\r\n\r\nMAC2:\r\n43669127ae268092c056fd8d03b38b5b    //D2\r\n```\r\n\r\nCBC-MAC：\r\n 初始 IV = 0\r\n 每块：\r\n\r\n```\r\nC1 = E(P1 xor IV)\r\nC2 = E(P2 xor C1)\r\n...\r\nCn = E(Pn xor C(n-1))\r\nMAC = Cn\r\n```\r\n\r\n最后一块密文作为 MAC。\r\n 这里只有两块所以C2就是密文。我们知道这个IV固定就是0了，那么我们C1就会变成E(p1)，第二段密文同理。\r\n 我们的目标构造一个新的消息 MSG3，同时知道所对应的最后一块密文，但是我们不知道加密的流程，所以MAC肯定是要从上面选一个用。\r\n\r\n首先他说要64个字节，那么我们能直接想到就是直接把两个msg拼接在一起\r\n\r\n```\r\nMSG3=p1|p2|p3|p4\r\n```\r\n\r\n前两块结束后状态：\r\n\r\n```\r\nC2=MAC1\r\n```\r\n\r\n于是第三块加密时实际输入CBC 会先异或上一块输出：\r\n\r\n```\r\n第三块输入：p3 xor MAC1\r\n```\r\n\r\n所以：\r\n\r\n```\r\nC3=E(p3 xor MAC1)\r\n```\r\n\r\n而 MSG2 中第一块是：\r\n\r\n```\r\nD1=E(p3)\r\n```\r\n\r\n两者不同。因此最终 MAC 不会等于 MAC2。\r\n 那么我们要想办法如何消掉这个 MAC1，使得希望第三块真正送入 AES 的数据仍然是p3\r\n\r\n那么我们知道了p3'=p3 xor MAC1的，那么我们再xor一个MAC1，就是p3'=p3 xor MAC1 xor MAC1那么就变成了p3'=p3，成功抵消，那么最后一块就成功变成了MAC2。\r\n 实际操作算一下\r\n\r\n```python\r\nfrom Crypto.Util.strxor import strxor  \r\n  \r\np3 = bytes.fromhex(\&#34;d8d94f33797e1f41cab9217793b2d0f0\&#34;)  \r\nmac1 = bytes.fromhex(\&#34;0712c867aa6ec7c1bb2b66312367b2c8\&#34;)  \r\n  \r\nprint((strxor(p3,mac1)).hex())\r\n\r\n#dfcb8754d310d88071924746b0d56238\r\n```\r\n\r\n那么最后答案就是\r\n\r\n```\r\nMSG3:\r\ne55e3e24a3ae7797808fdca05a16ac15eb5fa2e6185c23a814a35ba32b4637c2dfcb8754d310d88071924746b0d562382b93d46c2ead104dce4bfec453767719\r\nMAC3:\r\n43669127&#34;},{&#34;slug&#34;:&#34;crypto-wp-1&#34;,&#34;title&#34;:&#34;费马定理一小题&#34;,&#34;description&#34;:&#34;密码学的同事检测数论学习成果找的一道题，后发现出自nctf childRSA&#34;,&#34;pubDate&#34;:&#34;2026-06-17T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;writeup&#34;,&#34;wp&#34;,&#34;nctf&#34;],&#34;body&#34;:&#34;题目\r\n\r\n```python\r\nfrom random import choice\r\nfrom Crypto.Util.number import isPrime, sieve_base as primes\r\nfrom flag import flag\r\n\r\ndef getPrime(bits):\r\nwhile True:\r\n  n = 2\r\n  while n.bit_length() < bits:\r\n      n *= choice(primes)\t#primes为前10000个素数的列表\r\n  if isPrime(n + 1):\r\n\t  return n + 1\r\n\r\ne = 0x10001\r\nm = int.from_bytes(flag.encode(), 'big')\r\np, q = [getPrime(2048) for _ in range(2)]\r\nn = p * q\r\nc = pow(m, e, n)\r\n\r\nn = 32849718197337581823002243717057659218502519004386996660885100592872201948834155543125924395614928962750579667346279456710633774501407292473006312537723894221717638059058796679686953564471994009285384798450493756900459225040360430847240975678450171551048783818642467506711424027848778367427338647282428667393241157151675410661015044633282064056800913282016363415202171926089293431012379261585078566301060173689328363696699811123592090204578098276704877408688525618732848817623879899628629300385790344366046641825507767709276622692835393219811283244303899850483748651722336996164724553364097066493953127153066970594638491950199605713033004684970381605908909693802373826516622872100822213645899846325022476318425889580091613323747640467299866189070780620292627043349618839126919699862580579994887507733838561768581933029077488033326056066378869170169389819542928899483936705521710423905128732013121538495096959944889076705471928490092476616709838980562233255542325528398956185421193665359897664110835645928646616337700617883946369110702443135980068553511927115723157704586595844927607636003501038871748639417378062348085980873502535098755568810971926925447913858894180171498580131088992227637341857123607600275137768132347158657063692388249513\r\nc = 2630801835673985389538224010996889417516673128370292700216526899877370833521633899705831415771714713108329655131333404250980622985334148846108700995520385425331382760827546059278560773909199259143108034266408196203055704278486407453338070101458531566321878313016237617609477301047815936243433178727930330271809873557460546980&#34;},{&#34;slug&#34;:&#34;learn-crypto-1&#34;,&#34;title&#34;:&#34;web手从0学习密码的故事-1 数学基础&#34;,&#34;description&#34;:&#34;初等数论等密码相关的数学基础学习&#34;,&#34;pubDate&#34;:&#34;2026-06-16T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;math&#34;],&#34;body&#34;:&#34;# 零、前情提要\r\n\r\n总所周知，我是一个纯血web狗，可能会些misc，会点reverse，会一点点pwn，但是密码绝对是0基础，被某二比密码手骗入职了新公司，新公司给我的第一任务就是准备熵密杯...既然躲不掉，那就只能重拾数学课本开始了。\r\n\r\n# 一、初等数论\r\n\r\n## 基本数学概念\r\n\r\n### 整除\r\n\r\n若 $a = b \\times k$（k为整数），则称b整除a，记作 $b \\mid a$。\r\n例如 $3 \\mid 12$，因为 $12 = 3 \\times 4$。\r\n\r\n### 质数与合数\r\n\r\n质数：大于1且只能被1和自身整除的数（如2、3、5、7...）。\r\n合数：大于1且能被其他数整除的数（如4、6、8、9...）。\r\n1既不是质数也不是合数。\r\n\r\n### 质因数分解\r\n\r\n每个大于1的整数都可以唯一分解为质数的乘积。\r\n例如 $60 = 2^2 \\times 3 \\times 5$。\r\n\r\n### 模运算\r\n\r\na除以m的余数，称为a在模m下的余数，记作 $a \\mod m$。\r\n例如 $17 \\mod 5 = 2$，因为 $17 = 5 \\times 3 + 2$。\r\n\r\n### 同余\r\n\r\n若两个整数a和b除以m的余数相同，则称a与b在模m下同余，记作 $a \\equiv b \\pmod{m}$。\r\n例如 $17 \\equiv 2 \\pmod{5}$，$-3 \\equiv 4 \\pmod{7}$。\r\n\r\n### 乘法逆元\r\n\r\n若 $a \\times x \\equiv 1 \\pmod{m}$，则称x为a在模m下的乘法逆元，记作 $a^{-1}$。\r\n只有当 $gcd(a,m)=1$ 时，a在模m下才存在乘法逆元。\r\n例如 $3^{-1} \\equiv 4 \\pmod{11}$，因为 $3 \\times 4 = 12 \\equiv 1 \\pmod{11}$。\r\n\r\n### 费马小定理\r\n\r\n若p为质数，a不是p的倍数，则 $a^{p-1} \\equiv 1 \\pmod{p}$，如果是倍数则是$a^{p-1} \\equiv 0 \\pmod{p}$。\r\n等价形式：$a^p \\equiv a \\pmod{p}$。\r\n\r\n### 欧拉函数 $\\varphi(n)$\r\n\r\n小于n且与n互素的正整数个数。质数p时 $\\varphi(p) = p-1$。\r\n若 $n = p \\times q$（p、q为质数），则 $\\varphi(n) = (p-1)(q-1)$。\r\n\r\n### 欧拉定理\r\n\r\n若 $gcd(a,m)=1$，则 $a^{\\varphi(m)} \\equiv 1 \\pmod{m}$。\r\n费马小定理是欧拉定理在m为质数时的特例。\r\n\r\n### 二次剩余定理\r\n\r\n设 $p$ 为奇质数，$a$ 为整数且 $p \\nmid a$，若同余方程\r\n$$\r\nx^2 \\equiv a \\pmod{p}\r\n$$\r\n有解，则称 $a$ 是模 $p$ 的二次剩余，否则称为二次非剩余。\r\n例如模 7 下，$1^2\\equiv1$，$2^2\\equiv4$，$3^2\\equiv2$，故 $\\{1,2,4\\}$ 是二次剩余，$\\{3,5,6\\}$ 是二次非剩余。\r\n\r\n#### 二次剩余基本性质\r\n\r\n1. 模 $p$ 下恰好有 $\\frac{p-1}{2}$ 个二次剩余和 $\\frac{p-1}{2}$ 个二次非剩余。\r\n2. 乘法规律：$\\left(\\frac{ab}{p}\\right)=\\left(\\frac{a}{p}\\right)\\left(\\frac{b}{p}\\right)$。\r\n3. $-1$ 是模 $p$ 的二次剩余 $\\iff p \\equiv 1 \\pmod 4$。\r\n4. 2 是模 $p$ 的二次剩余 $\\iff p \\equiv \\pm 1 \\pmod 8$。\r\n5. 二次剩余之积仍为二次剩余；二次剩余与二次非剩余之积为二次非剩余。\r\n\r\n## 基础算法\r\n\r\n### 欧几里得算法 (GCD)\r\n\r\n两个整数的最大公约数等于其中较小的数和两数相除余数的最大公约数。\r\n\t例如求252和101的最大公约数，那么首先就是$252\\mod101=42$，那么252和101的最大公约数就等效为101和42的最大公约数，依此类推，直至余数变为0，剩下那个数就是最大公约数。\r\n欲求最大公约数的两个数为 $a,b$ ，第$i$步带余除法得到的商为 $q_i$ ,余数为 $r_{i+1}$ 。\r\n$$\r\na = b · q_0 + r_1  (0\\leq r_1 \\leq b)\r\n$$\r\ngcd(a,b)=gcd(b,r_1)\r\n\r\n同时假设$r_0 = a,r_1 = b$那么公式就变成了\r\n$$\r\nr_{i&#34;},{&#34;slug&#34;:&#34;hello-world&#34;,&#34;title&#34;:&#34;Hello, World&#34;,&#34;description&#34;:&#34;A first post to verify the blog pipeline works end-to-end — build, RSS, sitemap, terminal `blog` and `search` commands.&#34;,&#34;pubDate&#34;:&#34;2026-06-15T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;meta&#34;,&#34;test&#34;],&#34;body&#34;:&#34;This is a sanity-check post used to verify that the build pipeline is wired up correctly. If you can read it on the deployed site, the static generator, RSS feed, sitemap, and the terminal's `blog` and `search` commands are all working.\r\n\r\n## Markdown\r\n\r\n- Bullet lists render.\r\n- **Bold** and *italic* text render.\r\n- `inline code` and fenced code blocks render with Shiki highlighting.\r\n\r\n```ts\r\nfunction greet(name: string): string {\r\n  return `hello, ${name}!`;\r\n}\r\n\r\nconsole.log(greet('oSthing'));\r\n```\r\n\r\n> A short blockquote just to make sure that path is exercised too.\r\n\r\nIf anything looks off, the most likely culprit is a stale `dist/` — run `npm run build` again to refresh it.&#34;},{&#34;slug&#34;:&#34;java-sec从0-5到1-urldns链&#34;,&#34;title&#34;:&#34;JAVA_SEC从0.5到1_UrlDns链&#34;,&#34;description&#34;:&#34;2024-08-20&#34;,&#34;pubDate&#34;:&#34;2024-08-20T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;java_sec&#34;,&#34;代码审计&#34;,&#34;反序列化&#34;],&#34;body&#34;:&#34;我入门的第一条链子，我们可以直接从[ysoserial](https://github.com/frohoff/ysoserial/blob/master/src/main/java/ysoserial/payloads/URLDNS.java)里面链子进行分析\n\n```java\n/*\n *   Gadget Chain:\n *     HashMap.readObject()\n *       HashMap.putVal()\n *         HashMap.hash()\n *           URL.hashCode()\n */\n```\n\n我们构建好环境开始分析，我这里用的是java 8u65版本，任意版本都可以\n\n## URL.hashCode()\n\n那么我们直接从最底下的`hashCode`开始看\n\n```java\n    public synchronized int hashCode() {\n        if (hashCode != -1)\n            return hashCode;\n\n        hashCode = handler.hashCode(this);\n        return hashCode;\n    }\n```\n\n这里面调用了一个`handler`的`hashCode()`我们跟进去看一下\n\n```java\nprotected int hashCode(URL u) {\n    int h = 0;\n\n    // Generate the protocol part.\n    String protocol = u.getProtocol();\n    if (protocol != null)\n        h += protocol.hashCode();\n\n    // Generate the host part.\n    InetAddress addr = getHostAddress(u);\n    if (addr != null) {\n        h += addr.hashCode();\n    } else {\n        String host = u.getHost();\n        if (host != null)\n            h += host.toLowerCase().hashCode();\n    }\n\n    // Generate the file part.\n    String file = u.getFile();\n    if (file != null)\n        h += file.hashCode();\n\n    // Generate the port part.\n    if (u.getPort() == -1)\n        h += getDefaultPort();\n    else\n        h += u.getPort();\n\n    // Generate the ref part.\n    String ref = u.getRef();\n    if (ref != null)\n        h += ref.hashCode();\n\n    return h;\n}\n\n```\n\n那么我们最终要掉用的函数就是`getHostAddress`了，看简介就是进行一次访问的，这条链的目的就是用于测试一个攻击点是否可以用反序列化攻击\n\n> Get the IP address of our host. An empty host field or a DNS failure will result in a null return.\n\n我们简单测试一下\n\n```java\npackage org.example;\n\nimport java.net.MalformedURLException;\nimport java.net.URL;\n\npublic class Main {\n    public static void main(String[] args) throws MalformedURLException {\n        URL url=new URL(\&#34;http://rni5ssk3vjwz6l7kzf113aezpqvhj97y.oastify.com\&#34;);\n        url.hashCode();\n    }\n}\n```\n\n我们能再bp里面收到一条记录，说明成功访问到了\n\n![](E:/notes/web/从0.5开始的java安全/反序列化/img/urldns1.png)\n\n我们的目的是要反序列化的，也就是说我们要找一层&#34;},{&#34;slug&#34;:&#34;commonscollections-1链&#34;,&#34;title&#34;:&#34;CommonsCollections_1链&#34;,&#34;description&#34;:&#34;所有人的第一条cc链&#34;,&#34;pubDate&#34;:&#34;2024-08-20T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;java_sec&#34;,&#34;代码审计&#34;,&#34;反序列化&#34;],&#34;body&#34;:&#34;# CommonsCollections-1链\n\n 有了urldns的链子我们大概就有思路怎么找了，那么urldns只是供我们测试是否能进行反序列化的话，我们还需要有一条能供我们rce的链子\n\ncc这个库的作用不用我特别说了，总之就是一个很常用的工具类\n\n那么首先cc1链的环境要求比较苛刻，这里简单讲一下\n\n## 环境配置\n\njava版本：jdk 8u65\n\nmaven：3.6.3\n\ncc版本：3.2.1\n\n首先是java版本的下载，在https://www.oracle.com/java/technologies/downloads/\n记得一定要把语言改成英文再下， 8u65会下成8u71\n\n然后是源码包，不下源码包的话你看进去的变量会变成var1 var2这种解析后的代码\n\n源码包下载地址：https://hg.openjdk.org/jdk8u/jdk8u/jdk/rev/af660750b2f4\n点左侧的zip下载\n我们解压 jdk8u65 的 src.zip，解压完之后，我们把 openJDK 8u65 解压出来的 sun 文件夹拷贝进 jdk8u65 中，这样子就能把 .class 文件转换为 .java 文件了\n\n![](E:/notes/web/从0.5开始的java安全/反序列化/img/cc1-1.png)\n\n然后是cc的源码包\n\n首先导入cc\n\n```xml\n        <dependency>\n            <groupId>commons-collections</groupId>\n            <artifactId>commons-collections</artifactId>\n            <version>3.2.1</version>\n        </dependency>\n```\n\n然后下载源码包\n\n![](E:/notes/web/从0.5开始的java安全/反序列化/img/cc1-2.png)\n\n环境配置完成，正式开始审cc链了\n\n## Runtime.exec\n\n首先我们要先了解一下java是怎么命令执行的\n\n现在我们需要了解的是`runtime.exec`\n\n最基础的方法是这样\n\n```java\nimport java.io.IOException;\n\npublic class temp {\n    public static void main(String[] args) throws IOException {\n        Runtime.getRuntime().exec(\&#34;calc\&#34;);\n    }\n}\n```\n\n此外，我们还要了解反射调用执行\n\n```java\npublic class temp {\n    public static void main(String[] args) throws IOException, ClassNotFoundException, NoSuchMethodException, InvocationTargetException, IllegalAccessException {\n        Class c=Class.forName(\&#34;java.lang.Runtime\&#34;);\n        Method m=c.getMethod(\&#34;getRuntime\&#34;);\n        c.getMethod(\&#34;exec\&#34;, String.class).invoke(m.invoke(c),\&#34;calc\&#34;);\n    }\n}\n```\n\n`Class.forName`来获取类\n\n`getMethod`来获取类的方法\n\n`invoke` 的作用是执行方法，它的第一个参数是：\n\n- 如果这个方法是一个普通方法，那么第一个参数是类对象\n- 如果这个方法是一个静态方法，那么第一个参数是类\n\n这也比较好理解了，我们正常执行方法是 `[1].method([2], [3], [4]...)` ，其实在反射里就是\n`method.invoke([1], [2], [3], [4]...)` \n\n## InvokerTransformer.transform()\n\n我们直接来看yso的链子\n\n```java\n/*\n\tGadget chain:\n\t\tObjectInputStream.readObject()\n\t\t\tAnnotationInvocationHandler.readObject()\n\t\t\t\tMap(Proxy).entrySet()\n\t\t\t\t\tAnnotationInvocationHandler.invoke()\n\t\t\t\t\t\tLazyMap.get()\n\t\t\t\t\t\t\tChainedTransfo&#34;},{&#34;slug&#34;:&#34;python-pickle反序列化&#34;,&#34;title&#34;:&#34;Python_pickle反序列化&#34;,&#34;description&#34;:&#34;关于pickle反序列化的一点研究&#34;,&#34;pubDate&#34;:&#34;2024-08-20T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;python&#34;,&#34;pickle&#34;],&#34;body&#34;:&#34;# Pickle 反序列化\n\n> 我的世界有一个咒法学模组，也是栈编程，很有意思，有兴趣可以试一试，如果很难理解栈编程的话玩一下就完全明白了 :P\n\n`pickle`是一种栈语言，它有不同的编写方式，基于轻量级的 PVM（Pickle Virtual Machine）。\n\n- **指令处理器：**\n\n  指令处理器从流中读取操作码（opcode）和参数，并对其进行解释处理。重复这个动作，直到遇到结束符号 `.` 后停止。最终留在栈顶的值将被作为反序列化对象返回。\n\n- **栈（Stack）：**\n\n  采用 Python 的列表实现，用于临时存储数据、参数以及对象。\n\n- **记忆（Memo）：**\n\n  使用 Python 的字典实现，为 PVM 的整个生命周期提供存储。\n\n`pickle` 模块实现了对 Python 对象结构的二进制序列化和反序列化。\n\n`pickle` 主要包含四个方法，简要描述如下：\n\n```python\npickle.dump(obj, file)  # 将 obj 对象进行序列化并写入到 file 文件中，需要以二进制写入模式（'wb'）打开 file。\npickle.load(file)  # 从 file 文件中反序列化对象，需要以二进制读取模式（'rb'）打开 file。\npickle.dumps(obj)  # 将 obj 对象进行序列化并返回其字节表示。\npickle.loads(data)  # 反序列化 data（字节类对象）并返回相应的对象。\n```\n\n`dump` 和 `load` 方法类似于 PHP 的 `serialize` 和 `unserialize`。\n\n了解更多详情，请参阅[官方文档](https://docs.python.org/zh-cn/3/library/pickle.html)。\n\n实际上，`pickle` 可以看作一种独立的语言，通过编写操作码（opcode）可以执行 Python 代码、覆盖变量等操作。直接编写操作码的灵活性高于使用 `pickle` 序列化生成的代码。\n\n\n\n下面是基本的pickle的操作码(opcode)\n\n```python\nMARK           = b'('   # 在栈上推送特殊的标记对象\nSTOP           = b'.'   # 每个 pickle 都以 STOP 结束\nPOP            = b'0'   # 弹出栈顶元素\nPOP_MARK       = b'1'   # 弹出从栈顶到最上面的标记对象\nDUP            = b'2'   # 复制栈顶元素\nFLOAT          = b'F'   # 推送浮点数对象；十进制字符串参数\nINT            = b'I'   # 推送整数或布尔值；十进制字符串参数\nBININT         = b'J'   # 推送四字节有符号整数\nBININT1        = b'K'   # 推送一字节无符号整数\nLONG           = b'L'   # 推送长整数；十进制字符串参数\nBININT2        = b'M'   # 推送二字节无符号整数\nNONE           = b'N'   # 推送 None\nPERSID         = b'P'   # 推送持久对象；ID 取自字符串参数\nBINPERSID      = b'Q'   # 推送持久对象；ID 取自栈上的字符串参数\nREDUCE         = b'R'   # 对栈上的参数元组应用可调用对象\nSTRING         = b'S'   # 推送字符串；以 NL 结尾的字符串参数\nBINSTRING      = b'T'   # 推送字符串；计数二进制字符串参数\nSHORT_BINSTRING= b'U'   # 推送字符串；计数二进制字符串参数，长度 < 256 字节\nUNICODE        = b'V'   # 推送 Unicode 字符串；原始 Unicode 转义的参数\nBINUNICODE     = b'X'   # 推送字符串；计数 UTF-8 字符串参数\nAPPEND         = b'a'   # 将栈顶元素附加到其下的列表\nBUILD          = b'b'   # 调用 __setstate__ 或 __dict__.update()\nGLOBAL         = b'c'   # 推送 self.find_class(modname, name)；两个字符串参数\nDICT           = b'd'   # 从栈项构建字典\nEMPTY_DICT     = b'}'&#34;},{&#34;slug&#34;:&#34;python原型链污染笔记&#34;,&#34;title&#34;:&#34;Python原型链污染笔记&#34;,&#34;description&#34;:&#34;国赛遇到的，当时没有学过吃了大亏&#34;,&#34;pubDate&#34;:&#34;2024-08-20T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;python&#34;],&#34;body&#34;:&#34;# python原型链污染\n\n> 在国赛中遇到了，当时断网，也没有自己专门去学过，比赛一打完当天晚上就狠狠补上了这个知识，恨啊呜呜，题目很简单的，但是自己没学过就没做出来;w;\n\n\n\nPython原型链污染和Nodejs原型链污染的根本原理一样，Nodejs是对键值对的控制来进行污染，而Python则是对类属性值的污染，且只能对类的属性来进行污染不能够污染类的方法。\n\n## 关键代码\n\n```python\ndef merge(src, dst):\n    for k, v in src.items():\n        if hasattr(dst, '__getitem__'):\n            if dst.get(k) and type(v) == dict:\n                merge(v, dst.get(k))\n            else:\n                dst[k] = v\n        elif hasattr(dst, k) and type(v) == dict:\n            merge(v, getattr(dst, k))\n        else:\n            setattr(dst, k, v)\n```\n\n> `hasattr`(*object*, *name*)\n>\n> 参数是一个对象和一个字符串。如果字符串是对象的一个属性，则返回`True`，否则返回`False`\n\n下面代码逻辑就是递归查找k，如果对应的值是字典再次递归，直到查找到对应的值然后修改\n\n## 利用思路\n\n我们要污染的目标是一个类的父类，所以我们会用到关键的两个魔法属性\n\n**\\_\\_class\\_\\_**\n\n用于获取一个对象的类，这是一个对象的内置属性，它指向定义该对象的类，反射用的，在运行中获取一个类\n\n**\\_\\_base\\_\\_**\n\n属性用于获取一个类的直接父类(基类)，如果一个类没有显式地继承其他类，那么它的基类是内置的 `object` 类\n\n那么我们就可以通过这两个属性来污染他的父类\n\n下面简单看个例子\n\n```python\nclass a1:\n    secret = \&#34;aaa\&#34;\nclass b1(a1):\n    pass\nclass b2(a1):\n    pass\ndef merge(src, dst):\n    for k, v in src.items():\n        if hasattr(dst, '__getitem__'):\n            if dst.get(k) and type(v) == dict:\n                merge(v, dst.get(k))\n            else:\n                dst[k] = v\n        elif hasattr(dst, k) and type(v) == dict:\n            merge(v, getattr(dst, k))\n        else:\n            setattr(dst, k, v)\ninstance = b2()\npayload = {\n    \&#34;__class__\&#34; : {\n        \&#34;__base__\&#34; : {\n            \&#34;secret\&#34; : \&#34;bbb\&#34;\n        }\n    }\n}\n\nprint(b1.__class__,b1.__base__)\nprint(b1.secret)\nprint(instance.secret)\nmerge(payload, instance)\n\n\nprint(b1.secret)\nprint(instance.secret)\n```\n\n在我们污染了之后就发现我们的b1和b2的secret属性都变成了bbb\n\n可以的话可以自行在`merge(payload, instance)`处打个断点进行调试\n\n\n\n思路就是先`__class__`反射获取能调用到的类，然后用`__base__`获取到父类，然后对自己需要的目标进行污染\n\n## 利用\n\n### 获取全局变量\n\n在很多类中我们可以看到有很多类会有`__init__`方法，用于一个类的初始化。\n\n带有`__init__`的类有一个特性，那就是有`__globals__`属性，可以简单做一个测试\n\n```python\nclass A:\n    def __init__(self):\n        pass\nclass B:\n    pass\n\nprint(dir(A.__init__))\nprint(dir(B.__init__))\n```\n\n我们可以&#34;},{&#34;slug&#34;:&#34;java-sec从0-5到1&#34;,&#34;title&#34;:&#34;JAVA_SEC从0.5到1&#34;,&#34;description&#34;:&#34;2024-08-20&#34;,&#34;pubDate&#34;:&#34;2024-08-19T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;java_sec&#34;,&#34;代码审计&#34;,&#34;反序列化&#34;],&#34;body&#34;:&#34;# 从0.5开始的java安全\n\njava安全的门槛太高了....尤其是面对Java语言的抽象性时\n\n早在2024年初，我就萌生了学习Java安全的念头，但Java的复杂性让我望而却步。之后在参加xyctf时，N1ght师傅推荐了几篇关于Java安全的文章，可是那时连基础语法我都不太掌握，学习了两天就放弃了。\n\n后面丢丢捡捡总算是把java的基础学完了，后面java EE的知识更是痛苦至极，光是配置一些简单的环境就能耗费我一天的时间，学了一个星期也算是把最基础的一些学完了，但是也没有很扎实，反射 动态代理 类加载这种在java安全里很重要的知识也是因为天赋太笨没学会。后面简单的看了几条链子，跟着跟了也没跟会。\n\n八月一号入职安恒之后，加剧了我想要掌握Java安全的决心，打算从这里开始把java安全学好&#34;},{&#34;slug&#34;:&#34;graycatctf2024-wp&#34;,&#34;title&#34;:&#34;graycatCTF2024 wp&#34;,&#34;description&#34;:&#34;一场国际小比赛，闲的时候上去做了两题&#34;,&#34;pubDate&#34;:&#34;2024-07-14T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;writeup&#34;,&#34;match&#34;],&#34;body&#34;:&#34;## **Markdown Parser**(114 solves / 100 points)\n\n题目给了附件，打开题目，发现有一个写markdown的地方，写好之后会自动帮你把格式转换好，之后交给后台检查，那么就是xss，我们直接看源代码，直接看最关键的文件，是怎么格式化markdown的\n\n```javascript\nfunction parseMarkdown(markdownText) {\n    const lines = markdownText.split('\\n');\n    let htmlOutput = \&#34;\&#34;;\n    let inCodeBlock = false;\n\n    lines.forEach(line => {\n        if (inCodeBlock) {\n            if (line.startsWith('```')) {\n                inCodeBlock = false;\n                htmlOutput += '</code></pre>';\n            } else {\n                htmlOutput += escapeHtml(line) + '\\n';\n            }\n        } else {\n            if (line.startsWith('```')) {\n                language = line.substring(3).trim();\n                inCodeBlock = true;\n                htmlOutput += '<pre><code class=\&#34;language-' + language + '\&#34;>';\n            } else {\n                line = escapeHtml(line);\n                line = line.replace(/`(.*?)`/g, '<code>$1</code>');\n                line = line.replace(/^(######\\s)(.*)/, '<h6>$2</h6>');\n                line = line.replace(/^(#####\\s)(.*)/, '<h5>$2</h5>');\n                line = line.replace(/^(####\\s)(.*)/, '<h4>$2</h4>');\n                line = line.replace(/^(###\\s)(.*)/, '<h3>$2</h3>');\n                line = line.replace(/^(##\\s)(.*)/, '<h2>$2</h2>');\n                line = line.replace(/^(#\\s)(.*)/, '<h1>$2</h1>');\n                line = line.replace(/\\*\\*(.*?)\\*\\*/g, '<strong>$1</strong>');\n                line = line.replace(/__(.*?)__/g, '<strong>$1</strong>');\n                line = line.replace(/\\*(.*?)\\*/g, '<em>$1</em>');\n                line = line.replace(/_(.*?)_/g, '<em>$1</em>');\n                htmlOutput += line;\n            }\n        }\n    });\n\n    return htmlOutput;\n}\n\nfunction escapeHtml(text) {\n    return text\n        .replace(/&#38;/g, '&#38;amp;')\n        .replace(/</g, '&#38;lt;')\n        .replace(/>/g, '&#38;gt;')\n        .replace(/\&#34;/g, '&#38;quot;')\n        .replace(/'/g, '&#38;#039;');\n}\n\nmodule.exports = {\n    parseMarkdown\n};\n\n```\n\n有了之前比赛的经验，一眼就能看到这里有能注入的地方\n\n```&#34;},{&#34;slug&#34;:&#34;osu-gamingctf2024-wp&#34;,&#34;title&#34;:&#34;osu!gamingCTF2024 wp&#34;,&#34;description&#34;:&#34;和很多人一起玩了这个比赛，很有意思&#34;,&#34;pubDate&#34;:&#34;2024-07-14T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;writeup&#34;,&#34;match&#34;],&#34;body&#34;:&#34;> teamName: Ciallo\n>\n> rank: #65\n>\n> points: 3243\n>\n> blockchain (0/3 solved)\t-> 0/3243\n>\n> crypto (6/8 solved)\t-> 744/3243\n>\n> forensics (1/5 solved)\t-> 117/3243\n>\n> misc (3/9 solved)\t-> 304/3243\n>\n> osint (1/4 solved)\t->106/3243\n>\n> osu (5/10 solved)\t-> 550/3243\n>\n> pwn (3/4 solved)\t-> 422/3243\n>\n> reverse (4/5 solved)\t-> 533/3243\n>\n> web (4/6 solved)\t-> 467/3243\n\n## **mikufanpage**(490 solves / 104 points)\n\n https://mikufanpage.web.osugaming.lol/\n\n打开网页里面是一个图片的幻灯片循环播放，题目给了附件\n\n题目目录是这样的\n\n```\n│  app.js\n│  package-lock.json\n│  package.json\n│\n├─img\n│      flag.txt\n│      miku1.jpg\n│      miku2.jpg\n│      miku3.png\n│      miku4.png\n│      miku5.jpg\n│      miku6.png\n│      miku7.jpg\n│\n└─public\n        cube.mp3\n        dance.gif\n        favicon.ico\n        index.html\n```\n\n主要看app.js\n\n```js\nconst express = require('express'); \nconst path = require('path');\n\nconst app = express(); \nconst PORT = process.env.PORT ?? 3000;\n\napp.use(express.static(path.join(__dirname, 'public')));\n\napp.listen(PORT, (err) =>{ \n    if(!err) \n        console.log(\&#34;mikufanpage running on port \&#34;+ PORT) \n    else \n        console.log(\&#34;Err \&#34;, err); \n}); \n\napp.get(\&#34;/image\&#34;, (req, res) => {\n    if (req.query.path.split(\&#34;.\&#34;)[1] === \&#34;png\&#34; || req.query.path.split(\&#34;.\&#34;)[1] === \&#34;jpg\&#34;) { // only allow images\n        res.sendFile(path.resolve('./img/' + req.query.path));\n    } else {\n        res.status(403).send('Access Denied');\n    }\n});\n```\n\n我们的目的是要读取img下的flag.txt，关键代码如下\n\n```js\n if (req.query.path.split(\&#34;.\&#34;)[1] === \&#34;png\&#34; || req.query.path.split(\&#34;.\&#34;)[1] === \&#34;jpg\&#34;)\n```\n\n根据点来分割得到后缀名，那我们只需要用点把\&#34;png\&#34; 包裹住然后再在后面用 ../ 进行目录穿越即可，最后payload就是\n\n```\n/image?path=miku1.jpg./../flag.txt\n```\n\n得到flag\n\n```\nosu{miku_miku_miku_miku_miku_miku_miku_miku_miku_miku_miku_miku_miku}\n```\n\n## **when-you-dont-see-it**(235 solves / 111 points)\n\nhttps://osu.ppy.sh/users/11118671\n\n给了一个osu的[用户界面](https://osu.ppy.sh/users/11118671)\n\n右键查看源代码搜索flag，在最后一个flag出找到flag提示(这题解的人少的原因估计是搜索出来有342个flag字样然后懒得看吧= =)\n\n```\n[color=]the flag is b3N1e29rX3Vfc2VlX21&#34;},{&#34;slug&#34;:&#34;prealctf2024-wp&#34;,&#34;title&#34;:&#34;prealCTF2024 wp&#34;,&#34;description&#34;:&#34;印度理工办的ctf，跟着很厉害的人一起做的&#34;,&#34;pubDate&#34;:&#34;2024-07-14T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;writeup&#34;,&#34;match&#34;],&#34;body&#34;:&#34;> teamName: Ciallo～(∠・ω< )⌒☆\n>\n> rank: #6\n>\n> points:  7575\n>\n> Reversing: 1474/7575\n>\n> Miscellaneous: 438/7575\n>\n> Crypto: 1,248/7575\n>\n> Forensics: 904/7575\n>\n> Web: 1169/7575\n>\n> Blockchain: 788/7575\n>\n> OSINT: 100/7575\n>\n> Pwn: 1454/7575\n\n这次比赛收获很多，也是和一群很强的师傅打，也感受到了自己确实很菜;w;\n\n## **learn HTTP**(76 Solves/50 Points)\n\nhttps://learn-http.ctf.pearlctf.in\n\n给的是一个公共靶机里面有一个机器人那大概率是xss了，题目还给了附件，先简单看一下页面，看看题目要我们干什么，里面要我们写一个类似http请求的东西，然后把生成好的payload交给机器人检查，接下来我们看一下源码\n\n先看一下nodejs的源码\n\n```js\n//main.js\nrequire('dotenv').config()\n\nconst childProcess = require('child_process');\nvar jwt = require('jsonwebtoken');\n\nconst express = require(\&#34;express\&#34;)\nconst path = require(\&#34;path\&#34;)\nconst bodyParser = require(\&#34;body-parser\&#34;)\nvar cookieParser = require('cookie-parser')\n\nconst app = express()\n\napp.use(express.static(path.join(__dirname, 'public')))\napp.use(bodyParser.urlencoded({ extended: false }))\napp.use(cookieParser())\n\napp.get(\&#34;/\&#34;, (req, res) => {\n    res.sendFile(path.join(__dirname, \&#34;templates/index.html\&#34;))\n})\n\nconst genToken = () => {\n    var token = jwt.sign({ id: 1 }, process.env.SECRET);\n    return token\n}\n\napp.post(\&#34;/check\&#34;, (req, res) => {\n    try {\n        let req_body = req.body.body\n        \n        if (req_body == undefined) {\n            return res.status(200).send(\&#34;Body is not provided\&#34;)\n        }\n\n        let to_req = `http://localhost:5001/resp?body=${encodeURIComponent(req_body)}`\n\n        childProcess.spawn('node', ['./bot.js', JSON.stringify({\n            url: to_req,\n            token: genToken()\n        })]);\n\n        return res.status(200).send(\&#34;Admin will check!\&#34;)\n    } catch (e) {\n        console.log(e)\n        return res.status(500).send(\&#34;Internal Server Error\&#34;)\n    }\n})\n\napp.get(\&#34;/flag\&#34;, (req, res) => {\n    let token = req.cookies.token\n    try {\n        var decoded = jwt.verify(token, process.env.SECRET)\n        if (decoded.id != 2) {\n            return res.status(200).send(\&#34;You are not verified\&#34;)\n        }\n\n        return res.status(200).send(process.env.F&#34;},{&#34;slug&#34;:&#34;从国赛想到的一些php绕过注释符trick&#34;,&#34;title&#34;:&#34;从国赛想到的一些php绕过注释符trick&#34;,&#34;description&#34;:&#34;密码学的同事检测数论学习成果找的一道题，后发现出自nctf childRSA&#34;,&#34;pubDate&#34;:&#34;2024-07-14T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;web&#34;,&#34;php&#34;,&#34;trick&#34;,&#34;eval&#34;],&#34;body&#34;:&#34;# 从国赛衍生出来的一些php绕过注释符trick\n\n首先是在很早之前我在XYCTF出过的一道题，`牢牢记住，逝者为大`，题目代码是这样的\n\n```php\n<?php\nhighlight_file(__FILE__);\nfunction Kobe($cmd)\n{\n    if (strlen($cmd) > 13) {\n        die(\&#34;see you again~\&#34;);\n    }\n    if (preg_match(\&#34;/echo|exec|eval|system|fputs|\\.|\\/|\\\\|/i\&#34;, $cmd)) {\n        die(\&#34;肘死你\&#34;);\n    }\n    foreach ($_GET as $val_name => $val_val) {\n        if (preg_match(\&#34;/bin|mv|cp|ls|\\||f|a|l|\\?|\\*|\\>/i\&#34;, $val_val)) {\n            return \&#34;what can i say\&#34;;\n        }\n    }\n    return $cmd;\n}\n\n$cmd = Kobe($_GET['cmd']);\necho \&#34;#man,\&#34; . $cmd  . \&#34;,manba out\&#34;;\necho \&#34;<br>\&#34;;\neval(\&#34;#man,\&#34; . $cmd . \&#34;,mamba out\&#34;);\n```\n\n上面的代码在限制字数内能执行代码，当时我给出的解是用换行符进行绕过也就是`%0a`\n\n在比赛比完之后我就想还有没有其他绕过的方式...\n\n## ciscn2024华东南国赛WEB-粗心的程序员\n\n这题在扫出文件泄露之后，关键的漏洞代码如下\n\n```php\nerror_reporting(0);\ninclude \&#34;default_info_auto_recovery.php\&#34;;\nsession_start();\n$p = $_SERVER[\&#34;HTTP_X_FORWARDED_FOR\&#34;]?:$_SERVER[\&#34;REMOTE_ADDR\&#34;];\nif (preg_match(\&#34;/\\?|php|:/i\&#34;,$p))\n{\n    die(\&#34;\&#34;);\n}\n$time = date('Y-m-d h:i:s', time());\n$username = $_SESSION['username'];\n$id = $_SESSION['id'];\nif ($username &#38;&#38; $id){\n    echo \&#34;Hello,\&#34;.\&#34;$username\&#34;;\n    $str = \&#34;//登陆时间$time,$username $p\&#34;;\n    $str = str_replace(\&#34;\\n\&#34;,\&#34;\&#34;,$str);\n    file_put_contents(\&#34;config.php\&#34;,file_get_contents(\&#34;config.php\&#34;).$str);\n}else{\n    die(\&#34;NO ACCESS\&#34;);\n}\n```\n\n那么我们要绕过的地方就在这里\n\n```php\n$str = \&#34;//登陆时间$time,$username $p\&#34;;\n```\n\n我们能看到`\\n`被过滤了，那么我们还有什么其他办法能绕呢 \n\n## 方法1 \\r\n\n`\\r` (回车) 和 `\\n` (换行) 是在计算机中用于都表示行终止符的控制字符。\n\n1. **`\\n`**:\n   - 在 Linux 以及编程语言中，`\\n` 表示行的结束，在这些系统中，`\\n` 会将光标移动到下一行的开头。\n2. **`\\r`**:\n   - 在早期的系统和编程语言中，`\\r` 表示将光标移到当前行的开头，而不移动到下一行。\n   - 在 Windows 系统中，行终止符通常由 `\\r\\n` 组合表示。`\\r` 使光标回到行首，`\\n` 将光标移动到下一行。\n\n那么假设我们有这么一串字符串\n\n```\nHello \\rWorld\n```\n\n在大多数现代环境中，回显则会是\n\n```\nWorld\n```\n\n因为 \\r 将光标移回行首，随后 World 覆盖了 Hello\n\n我们在python中进行实验发现是符合的\n\n```python\n$ python\n\n>>> print(\&#34;hello \\rworld\&#34;) \nworld\n>>>\n```\n\n而在我们神奇的php中呢\n\n```php\n<?php\necho \&#34;hello \\rworld\&#34;;\n```\n\n则是回显\n\n```\nhello \nworld\n```\n\n那么我们在php中我们便可以用\\r代替换行符\n\n## 方法2 ?>\n\n某一天我在写wp的时候，准备把wp的代码写上注释再跑一遍\n\n```php\n<?php\neval(base64_decode(\&#34;Pz48P3BocCB&#34;}]" data-friends="[{&#34;name&#34;:&#34;adwa&#34;,&#34;url&#34;:&#34;https://languag3.github.io/&#34;,&#34;description&#34;:&#34;喜欢犯贱的超强密码手（真的很喜欢犯贱）&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;]},{&#34;name&#34;:&#34;Mother Ship&#34;,&#34;url&#34;:&#34;https://blog.mothership.top/&#34;,&#34;description&#34;:&#34;妈船，osu!老资历，计算机领域大神?!&#34;,&#34;tags&#34;:[&#34;osu!&#34;,&#34;engineering&#34;]}]"> <div id="terminal-output" class="terminal-output" aria-live="polite"></div> <form id="terminal-form" class="terminal-form" autocomplete="off"> <span id="terminal-prompt" class="terminal-prompt"></span> <input id="terminal-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus class="terminal-input" aria-label="terminal input"> </form> </div> </div> <div class="mt-8 grid gap-3 text-sm text-muted-light dark:text-muted-dark md:grid-cols-3"> <div> <span class="font-mono text-xs uppercase tracking-wider">type</span> <code class="ml-2 font-mono">help</code> <span class="ml-1">to list commands</span> </div> <div> <span class="font-mono text-xs uppercase tracking-wider">read</span> <code class="ml-2 font-mono">blog</code> <span class="ml-1">for posts</span> </div> <div> <span class="font-mono text-xs uppercase tracking-wider">find</span> <code class="ml-2 font-mono">search &lt;term&gt;</code> </div> </div> </section> <script type="module" src="/_astro/Terminal.astro_astro_type_script_index_0_lang.CXJeW_fC.js"></script>  </main> <footer class="border-t border-border-light dark:border-border-dark"> <div class="mx-auto fl
