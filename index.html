n dark:block h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <circle cx="12" cy="12" r="4"></circle> <path d="M12 2v2"></path> <path d="M12 20v2"></path> <path d="m4.93 4.93 1.41 1.41"></path> <path d="m17.66 17.66 1.41 1.41"></path> <path d="M2 12h2"></path> <path d="M20 12h2"></path> <path d="m6.34 17.66-1.41 1.41"></path> <path d="m19.07 4.93-1.41 1.41"></path> </svg> <svg class="block dark:hidden h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path> </svg> </button> <script type="module">const e=document.getElementById("theme-toggle");e?.addEventListener("click",()=>{const t=document.documentElement.classList.toggle("dark");try{localStorage.setItem("theme",t?"dark":"light")}catch{}});</script> </div> </div> <div class="mx-auto w-full max-w-6xl px-6 pb-3 text-xs text-muted-light dark:text-muted-dark"> <a href="/" class="hover:text-fg-light dark:hover:text-fg-dark">→ launch terminal</a> </div> </header> <main class="flex-1 w-full">  <section class="mx-auto w-full max-w-5xl px-6 py-10 md:py-16"> <div class="terminal-host shadow-sm"> <div class="terminal-titlebar"> <span class="terminal-dot"></span> <span class="terminal-dot"></span> <span class="terminal-dot"></span> <span class="ml-3 font-mono text-xs text-muted-light dark:text-muted-dark">

</span> </div> <div id="terminal-host" class="terminal-body h-[460px] md:h-[560px] overflow-y-auto px-4 py-3 font-mono text-sm" data-posts="[{&#34;slug&#34;:&#34;hello-world&#34;,&#34;title&#34;:&#34;Hello, World&#34;,&#34;description&#34;:&#34;A first post to verify the blog pipeline works end-to-end — build, RSS, sitemap, terminal `blog` and `search` commands.&#34;,&#34;pubDate&#34;:&#34;2026-06-16T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;meta&#34;,&#34;test&#34;],&#34;body&#34;:&#34;This is a sanity-check post used to verify that the build pipeline is wired up correctly. If you can read it on the deployed site, the static generator, RSS feed, sitemap, and the terminal's `blog` and `search` commands are all working.\r\n\r\n## Markdown\r\n\r\n- Bullet lists render.\r\n- **Bold** and *italic* text render.\r\n- `inline code` and fenced code blocks render with Shiki highlighting.\r\n\r\n```ts\r\nfunction greet(name: string): string {\r\n  return `hello, ${name}!`;\r\n}\r\n\r\nconsole.log(greet('oSthing'));\r\n```\r\n\r\n> A short blockquote just to make sure that path is exercised too.\r\n\r\nIf anything looks off, the most likely culprit is a stale `dist/` — run `npm run build` again to refresh it.&#34;},{&#34;slug&#34;:&#34;building-this-terminal-blog&#34;,&#34;title&#34;:&#34;Building this terminal blog&#34;,&#34;description&#34;:&#34;How a minimal Astro site with xterm.js became my writing home — design notes, tradeoffs, and the small details that matter.&#34;,&#34;pubDate&#34;:&#34;2026-04-12T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;astro&#34;,&#34;xterm&#34;,&#34;design&#34;,&#34;meta&#34;],&#34;body&#34;:&#34;I rewrote my blog four times before settling on this version. Each iteration taught me something, but the throughline is the same: a personal site should feel personal. Mine happens to feel like a terminal — because that is the interface I actually live in.\r\n\r\n## Why a terminal UI\r\n\r\nMost blog homepages front-load metadata: latest post, tag cloud, author photo, RSS link. None of that is what I want when I open a blog. I want to read. The terminal is the inverse — it gives me a single, quiet surface and lets me ask for what I need.\r\n\r\n```bash\r\n$ blog\r\n2026-04-12  Building this terminal blog\r\n             → /blog/building-this-terminal-blog\r\n2026-03-02  Cryptography fundamentals\r\n             → /blog/cryptography-fundamentals\r\n```\r\n\r\n## Stack\r\n\r\nAstro for static generation and content collections. Tailwind for styling. xterm.js for the actual terminal — it handles input, history, and rendering for free. No backend, no database. Markdown files in a folder become posts.\r\n\r\n> If your blog needs a server to render, you have already lost.\r\n> — every site I've shipped\r\n\r\n## The boot sequence\r\n\r\nThe first thing you see is a few lines that pretend to load:\r\n\r\n```\r\noSthing's blog v1.0\r\nCiallo～(∠・ω< )⌒☆\r\ntype help to list commands. > is the prompt.\r\n```\r\n\r\nIt is theatre. The page is already interactive. But the theatre tells you what kind of place you are in, the way a door tells you whether you are entering a library or a gym.\r\n\r\n## Open questions\r\n\r\n- Should `cd` accept `~`? Right now it does, but only as a synonym for `/`.\r\n- Should `search` rank by relevance or recency? Currently it lists in insertion order.\r\n- Should the theme toggle remember per-page state, or be global? Global wins for predictability.\r\n\r\nIf you have opinions, the contact page is one click away.&#34;},{&#34;slug&#34;:&#34;minimalist-web-design&#34;,&#34;title&#34;:&#34;Notes on minimalist web design&#34;,&#34;description&#34;:&#34;What I learned from stripping a UI down to one screen, one font, and one accent color.&#34;,&#34;pubDate&#34;:&#34;2026-02-08T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;design&#34;,&#34;css&#34;,&#34;minimalism&#34;],&#34;body&#34;:&#34;Minimalist design is not about removing things until nothing is left. It is about removing things until only what matters remains. The distinction matters: the first produces empty screens, the second produces calm ones.\r\n\r\n## Constraints force decisions\r\n\r\nWhen I built this site, I gave myself three constraints:\r\n\r\n1. One typeface family.\r\n2. One accent color.\r\n3. No animations longer than 200ms.\r\n\r\nEvery decision I made afterward was forced by these constraints. The header cannot use three weights because I only have one. The terminal cannot have a rainbow palette because there is no palette to pull from. Constraints are liberating.\r\n\r\n## Hierarchy comes from spacing\r\n\r\nWithout color to lean on, hierarchy has to come from somewhere. For me that meant generous vertical rhythm — large titles, generous line-height, and consistent padding. The eye learns where to look because each section's shape is the same.\r\n\r\n## Refuse ornament\r\n\r\nA underline can be a link. A bold weight can be a heading. A border can be a card. You do not need arrows, icons, or color shifts for the user to understand what is clickable. The web has spent twenty years adding chrome; it is fine to give some of it back.\r\n\r\n## The test\r\n\r\nA minimalist design is good when a stranger can tell what to do within two seconds, and a returning visitor does not notice the design at all. If either fails, you removed something you shouldn't have — or kept something you shouldn't.&#34;}]" data-friends="[{&#34;name&#34;:&#34;example&#34;,&#34;url&#34;:&#34;https://example.com&#34;,&#34;description&#34;:&#34;placeholder entry — replace with real friends.&#34;,&#34;tags&#34;:[&#34;placeholder&#34;]}]"> <div id="terminal-output" class="terminal-output" aria-live="polite"></div> <form id="terminal-form" class="terminal-form" autocomplete="off"> <span id="terminal-prompt" class="terminal-prompt"></span> <input id="terminal-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus class="terminal-input" aria-label="terminal input"> </form> </div> </d
