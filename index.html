</span> </div> <div id="terminal-host" class="terminal-body h-[460px] md:h-[560px] overflow-y-auto px-4 py-3 font-mono text-sm" data-posts="[{&#34;slug&#34;:&#34;learn-crypto-2&#34;,&#34;title&#34;:&#34;web手从0学习密码的故事-2 加密模式&#34;,&#34;description&#34;:&#34;关于常见对称分组加密的加密方式以及对应的常见攻击手法&#34;,&#34;pubDate&#34;:&#34;2026-06-24T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;math&#34;],&#34;body&#34;:&#34;## 加密模式\r\n\r\n### ECB 模式\r\n\r\nECB（Electronic Codebook，电子密码本）模式是最基础、最简单的块密码加密模式。\r\n\r\n**加密流程：**\r\n\r\n- 将明文分成固定长度的块 $P_1, P_2, \\dots, P_q$\r\n- 每个明文块使用相同的密钥 $K$ 独立加密\r\n- 加密公式：$C_i = E_K(P_i)$\r\n- 各分组之间完全独立、互不影响\r\n- 最终密文为：$C = C_1 \\| C_2 \\| \\dots \\| C_q$\r\n\r\n![image-20260624093519409](./assets/learn-crypto-2/image-20260624093519409.png)\r\n\r\n**解密流程：**\r\n\r\n- 将密文分成等长的块 $C_1, C_2, \\dots, C_q$\r\n- 每个密文块使用相同的密钥 $K$ 独立解密\r\n- 解密公式：$P_i = D_K(C_i)$\r\n- 各分组之间完全独立，可并行处理\r\n\r\n![image-20260624093527003](./assets/learn-crypto-2/image-20260624093527003.png)\r\n\r\n**ECB 模式特点：**\r\n\r\n- 简单直接：每个明文块独立加密，像查字典一样\r\n- 确定性：相同密钥下，相同明文块总是产生相同密文块（最大缺陷）\r\n- 可并行化：各块独立，可并行加密/解密\r\n- 不适合加密长消息或含重复模式的数据（如图片）\r\n\r\n#### ECB 块重排攻击\r\n\r\n在块加密中ECB模式中每个块都是独立加密的。因此攻击者可以在未知密钥的情况下，对密文中的块进行重新排列，组合成合法的可解密的新密文。\r\n例如，现在有一个cookie：\r\n\r\n```\r\nadmin=0;username=test123\r\n```\r\n\r\n假设块字节大小是8字节，那么明文就能拆分成三块\r\n\r\n```\r\nadmin=0;\r\nusername\r\n=test123\r\n```\r\n\r\n那么现在我们需要把admin变成1使其越权\r\n那么我们就可以通过构造用户名来得到admin=1的块，然后替换掉第一块即可，比如\r\n\r\n```\r\nadmin=0;username=test123admin=1;\r\n```\r\n\r\n那么拆分成块得到\r\n\r\n```\r\nadmin=0;\r\nusername\r\n=test123\r\nadmin=1;\r\n```\r\n\r\n我们就得到了admin=1的密文，替换掉第一个密文即可越权成为admin\r\n\r\n#### ECB 字节频率统计 / 已知明文攻击\r\n\r\nECB 模式最大的缺陷是确定性：相同的明文块在同一密钥下必定产生相同的密文块。攻击者可以利用这一特性进行统计或已知明文分析。\r\n\r\n**示例 —— 加密 Tux 图像：**\r\n\r\n![image-20260624094014339](./assets/learn-crypto-2/image-20260624094014339.png)\r\n\r\n假设原始企鹅图像包含大片相同颜色的背景。加密后：\r\n\r\n```\r\n原始位图（明文块）：    加密后（密文块）：\r\n[黑][黑][黑][黑][轮廓]  →  [C1][C1][C1][C1][C5]\r\n[黑][黑][黑][轮廓][轮廓] →  [C1][C1][C5][C5][C5]\r\n```\r\n\r\n观察密文就能还原出企鹅轮廓，完全不需要密钥。\r\n\r\n\r\n\r\n已知明文攻击示例 —— 网站 cookie 模板：\r\n\r\n假设服务器对固定格式 `user=XXX;role=user` 进行 ECB 加密（块大小 8 字节）：\r\n\r\n```\r\n明文：    user=Alc;role=user\r\n分块：    user=Alc | ;role=us | er????\r\n密文：    abcdef01 | 12345678 | 9abcdef0\r\n```\r\n\r\n攻击者已知前两块的明文内容后，可以构造任意相同前缀的明文，再观察对应密文即可推断第三块内容。例如注册 `user=Alc;role=admin` 时第三块密文如果变为 `fedcba98`，即可推断该块对应 `admin??` 的密文。\r\n\r\n### CBC 模式\r\n\r\nCBC（Cipher Block Chaining，密码分组链接）模式通过引入\&#34;链接\&#34;机制解决了ECB的安全性问题。\r\n\r\n**加密流程：**\r\n\r\n- 使用初始化向量 $IV$ 启动加密过程\r\n- 每个明文块先与前一个密文块异或，再进行加密\r\n- 第一块：$C_1 = E_K(P_1 \\oplus IV)$\r\n- 后续块：$C_i = E_K(P_i \\oplus C_{i-1})$\r\n- 加密&#34;},{&#34;slug&#34;:&#34;crypto-wp-2&#34;,&#34;title&#34;:&#34;关于CBC-MAC长度扩展一小题复现&#34;,&#34;description&#34;:&#34;题出自2023熵密杯初始谜题，不是很难，但是还是思考了好一会，还是理解不够深&#34;,&#34;pubDate&#34;:&#34;2026-06-23T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;writeup&#34;,&#34;wp&#34;,&#34;熵密杯&#34;],&#34;body&#34;:&#34;题目\r\n\r\n```\r\n-----------------------------------------------------\r\nMSG1:\r\ne55e3e24a3ae7797808fdca05a16ac15eb5fa2e6185c23a814a35ba32b4637c2\r\nMAC1:\r\n0712c867aa6ec7c1bb2b66312367b2c8\r\n\r\n-----------------------------------------------------\r\nMSG2:\r\nd8d94f33797e1f41cab9217793b2d0f02b93d46c2ead104dce4bfec453767719\r\nMAC2:\r\n43669127ae268092c056fd8d03b38b5b\r\n\r\n-----------------------------------------------------\r\n请输入您的MSG3(64字节，128个Hex，不要添加空格！)(Please input your 64bytes MSG3(64 bytes,128 hexs,don't using space)):\r\n\r\n请输入您的MAC3(Please input your MAC3):\r\n```\r\n\r\n有两组消息和对应 MAC(共两块，每块 16 bytes)：\r\n\r\n```\r\nMSG1:\r\ne55e3e24a3ae7797808fdca05a16ac15    //p1\r\neb5fa2e6185c23a814a35ba32b4637c2    //p2\r\n\r\nMAC1:\r\n0712c867aa6ec7c1bb2b66312367b2c8    //C2\r\n\r\nMSG2:\r\nd8d94f33797e1f41cab9217793b2d0f0    //p3\r\n2b93d46c2ead104dce4bfec453767719    //p4\r\n\r\nMAC2:\r\n43669127ae268092c056fd8d03b38b5b    //D2\r\n```\r\n\r\nCBC-MAC：\r\n 初始 IV = 0\r\n 每块：\r\n\r\n```\r\nC1 = E(P1 xor IV)\r\nC2 = E(P2 xor C1)\r\n...\r\nCn = E(Pn xor C(n-1))\r\nMAC = Cn\r\n```\r\n\r\n最后一块密文作为 MAC。\r\n 这里只有两块所以C2就是密文。我们知道这个IV固定就是0了，那么我们C1就会变成E(p1)，第二段密文同理。\r\n 我们的目标构造一个新的消息 MSG3，同时知道所对应的最后一块密文，但是我们不知道加密的流程，所以MAC肯定是要从上面选一个用。\r\n\r\n首先他说要64个字节，那么我们能直接想到就是直接把两个msg拼接在一起\r\n\r\n```\r\nMSG3=p1|p2|p3|p4\r\n```\r\n\r\n前两块结束后状态：\r\n\r\n```\r\nC2=MAC1\r\n```\r\n\r\n于是第三块加密时实际输入CBC 会先异或上一块输出：\r\n\r\n```\r\n第三块输入：p3 xor MAC1\r\n```\r\n\r\n所以：\r\n\r\n```\r\nC3=E(p3 xor MAC1)\r\n```\r\n\r\n而 MSG2 中第一块是：\r\n\r\n```\r\nD1=E(p3)\r\n```\r\n\r\n两者不同。因此最终 MAC 不会等于 MAC2。\r\n 那么我们要想办法如何消掉这个 MAC1，使得希望第三块真正送入 AES 的数据仍然是p3\r\n\r\n那么我们知道了p3'=p3 xor MAC1的，那么我们再xor一个MAC1，就是p3'=p3 xor MAC1 xor MAC1那么就变成了p3'=p3，成功抵消，那么最后一块就成功变成了MAC2。\r\n 实际操作算一下\r\n\r\n```python\r\nfrom Crypto.Util.strxor import strxor  \r\n  \r\np3 = bytes.fromhex(\&#34;d8d94f33797e1f41cab9217793b2d0f0\&#34;)  \r\nmac1 = bytes.fromhex(\&#34;0712c867aa6ec7c1bb2b66312367b2c8\&#34;)  \r\n  \r\nprint((strxor(p3,mac1)).hex())\r\n\r\n#dfcb8754d310d88071924746b0d56238\r\n```\r\n\r\n那么最后答案就是\r\n\r\n```\r\nMSG3:\r\ne55e3e24a3ae7797808fdca05a16ac15eb5fa2e6185c23a814a35ba32b4637c2dfcb8754d310d88071924746b0d562382b93d46c2ead104dce4bfec453767719\r\nMAC3:\r\n43669127&#34;},{&#34;slug&#34;:&#34;crypto-wp-1&#34;,&#34;title&#34;:&#34;费马定理一小题&#34;,&#34;description&#34;:&#34;密码学的同事检测数论学习成果找的一道题，后发现出自nctf childRSA&#34;,&#34;pubDate&#34;:&#34;2026-06-17T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;writeup&#34;,&#34;wp&#34;,&#34;nctf&#34;],&#34;body&#34;:&#34;题目\r\n\r\n```python\r\nfrom random import choice\r\nfrom Crypto.Util.number import isPrime, sieve_base as primes\r\nfrom flag import flag\r\n\r\ndef getPrime(bits):\r\nwhile True:\r\n  n = 2\r\n  while n.bit_length() < bits:\r\n      n *= choice(primes)\t#primes为前10000个素数的列表\r\n  if isPrime(n + 1):\r\n\t  return n + 1\r\n\r\ne = 0x10001\r\nm = int.from_bytes(flag.encode(), 'big')\r\np, q = [getPrime(2048) for _ in range(2)]\r\nn = p * q\r\nc = pow(m, e, n)\r\n\r\nn = 32849718197337581823002243717057659218502519004386996660885100592872201948834155543125924395614928962750579667346279456710633774501407292473006312537723894221717638059058796679686953564471994009285384798450493756900459225040360430847240975678450171551048783818642467506711424027848778367427338647282428667393241157151675410661015044633282064056800913282016363415202171926089293431012379261585078566301060173689328363696699811123592090204578098276704877408688525618732848817623879899628629300385790344366046641825507767709276622692835393219811283244303899850483748651722336996164724553364097066493953127153066970594638491950199605713033004684970381605908909693802373826516622872100822213645899846325022476318425889580091613323747640467299866189070780620292627043349618839126919699862580579994887507733838561768581933029077488033326056066378869170169389819542928899483936705521710423905128732013121538495096959944889076705471928490092476616709838980562233255542325528398956185421193665359897664110835645928646616337700617883946369110702443135980068553511927115723157704586595844927607636003501038871748639417378062348085980873502535098755568810971926925447913858894180171498580131088992227637341857123607600275137768132347158657063692388249513\r\nc = 2630801835673985389538224010996889417516673128370292700216526899877370833521633899705831415771714713108329655131333404250980622985334148846108700995520385425331382760827546059278560773909199259143108034266408196203055704278486407453338070101458531566321878313016237617609477301047815936243433178727930330271809873557460546980&#34;},{&#34;slug&#34;:&#34;learn-crypto-1&#34;,&#34;title&#34;:&#34;web手从0学习密码的故事-1 数学基础&#34;,&#34;description&#34;:&#34;初等数论等密码相关的数学基础学习&#34;,&#34;pubDate&#34;:&#34;2026-06-16T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;,&#34;math&#34;],&#34;body&#34;:&#34;# 零、前情提要\r\n\r\n总所周知，我是一个纯血web狗，可能会些misc，会点reverse，会一点点pwn，但是密码绝对是0基础，被某二比密码手骗入职了新公司，新公司给我的第一任务就是准备熵密杯...既然躲不掉，那就只能重拾数学课本开始了。\r\n\r\n# 一、初等数论\r\n\r\n## 基本数学概念\r\n\r\n### 整除\r\n\r\n若 $a = b \\times k$（k为整数），则称b整除a，记作 $b \\mid a$。\r\n例如 $3 \\mid 12$，因为 $12 = 3 \\times 4$。\r\n\r\n### 质数与合数\r\n\r\n质数：大于1且只能被1和自身整除的数（如2、3、5、7...）。\r\n合数：大于1且能被其他数整除的数（如4、6、8、9...）。\r\n1既不是质数也不是合数。\r\n\r\n### 质因数分解\r\n\r\n每个大于1的整数都可以唯一分解为质数的乘积。\r\n例如 $60 = 2^2 \\times 3 \\times 5$。\r\n\r\n### 模运算\r\n\r\na除以m的余数，称为a在模m下的余数，记作 $a \\mod m$。\r\n例如 $17 \\mod 5 = 2$，因为 $17 = 5 \\times 3 + 2$。\r\n\r\n### 同余\r\n\r\n若两个整数a和b除以m的余数相同，则称a与b在模m下同余，记作 $a \\equiv b \\pmod{m}$。\r\n例如 $17 \\equiv 2 \\pmod{5}$，$-3 \\equiv 4 \\pmod{7}$。\r\n\r\n### 乘法逆元\r\n\r\n若 $a \\times x \\equiv 1 \\pmod{m}$，则称x为a在模m下的乘法逆元，记作 $a^{-1}$。\r\n只有当 $gcd(a,m)=1$ 时，a在模m下才存在乘法逆元。\r\n例如 $3^{-1} \\equiv 4 \\pmod{11}$，因为 $3 \\times 4 = 12 \\equiv 1 \\pmod{11}$。\r\n\r\n### 费马小定理\r\n\r\n若p为质数，a不是p的倍数，则 $a^{p-1} \\equiv 1 \\pmod{p}$，如果是倍数则是$a^{p-1} \\equiv 0 \\pmod{p}$。\r\n等价形式：$a^p \\equiv a \\pmod{p}$。\r\n\r\n### 欧拉函数 $\\varphi(n)$\r\n\r\n小于n且与n互素的正整数个数。质数p时 $\\varphi(p) = p-1$。\r\n若 $n = p \\times q$（p、q为质数），则 $\\varphi(n) = (p-1)(q-1)$。\r\n\r\n### 欧拉定理\r\n\r\n若 $gcd(a,m)=1$，则 $a^{\\varphi(m)} \\equiv 1 \\pmod{m}$。\r\n费马小定理是欧拉定理在m为质数时的特例。\r\n\r\n### 二次剩余定理\r\n\r\n设 $p$ 为奇质数，$a$ 为整数且 $p \\nmid a$，若同余方程\r\n$$\r\nx^2 \\equiv a \\pmod{p}\r\n$$\r\n有解，则称 $a$ 是模 $p$ 的二次剩余，否则称为二次非剩余。\r\n例如模 7 下，$1^2\\equiv1$，$2^2\\equiv4$，$3^2\\equiv2$，故 $\\{1,2,4\\}$ 是二次剩余，$\\{3,5,6\\}$ 是二次非剩余。\r\n\r\n#### 二次剩余基本性质\r\n\r\n1. 模 $p$ 下恰好有 $\\frac{p-1}{2}$ 个二次剩余和 $\\frac{p-1}{2}$ 个二次非剩余。\r\n2. 乘法规律：$\\left(\\frac{ab}{p}\\right)=\\left(\\frac{a}{p}\\right)\\left(\\frac{b}{p}\\right)$。\r\n3. $-1$ 是模 $p$ 的二次剩余 $\\iff p \\equiv 1 \\pmod 4$。\r\n4. 2 是模 $p$ 的二次剩余 $\\iff p \\equiv \\pm 1 \\pmod 8$。\r\n5. 二次剩余之积仍为二次剩余；二次剩余与二次非剩余之积为二次非剩余。\r\n\r\n## 基础算法\r\n\r\n### 欧几里得算法 (GCD)\r\n\r\n两个整数的最大公约数等于其中较小的数和两数相除余数的最大公约数。\r\n\t例如求252和101的最大公约数，那么首先就是$252\\mod101=42$，那么252和101的最大公约数就等效为101和42的最大公约数，依此类推，直至余数变为0，剩下那个数就是最大公约数。\r\n欲求最大公约数的两个数为 $a,b$ ，第$i$步带余除法得到的商为 $q_i$ ,余数为 $r_{i+1}$ 。\r\n$$\r\na = b · q_0 + r_1  (0\\leq r_1 \\leq b)\r\n$$\r\ngcd(a,b)=gcd(b,r_1)\r\n\r\n同时假设$r_0 = a,r_1 = b$那么公式就变成了\r\n$$\r\nr_{i&#34;},{&#34;slug&#34;:&#34;hello-world&#34;,&#34;title&#34;:&#34;Hello, World&#34;,&#34;description&#34;:&#34;A first post to verify the blog pipeline works end-to-end — build, RSS, sitemap, terminal `blog` and `search` commands.&#34;,&#34;pubDate&#34;:&#34;2026-06-15T00:00:00.000Z&#34;,&#34;tags&#34;:[&#34;meta&#34;,&#34;test&#34;],&#34;body&#34;:&#34;This is a sanity-check post used to verify that the build pipeline is wired up correctly. If you can read it on the deployed site, the static generator, RSS feed, sitemap, and the terminal's `blog` and `search` commands are all working.\r\n\r\n## Markdown\r\n\r\n- Bullet lists render.\r\n- **Bold** and *italic* text render.\r\n- `inline code` and fenced code blocks render with Shiki highlighting.\r\n\r\n```ts\r\nfunction greet(name: string): string {\r\n  return `hello, ${name}!`;\r\n}\r\n\r\nconsole.log(greet('oSthing'));\r\n```\r\n\r\n> A short blockquote just to make sure that path is exercised too.\r\n\r\nIf anything looks off, the most likely culprit is a stale `dist/` — run `npm run build` again to refresh it.&#34;}]" data-friends="[{&#34;name&#34;:&#34;adwa&#34;,&#34;url&#34;:&#34;https://languag3.github.io/&#34;,&#34;description&#34;:&#34;喜欢犯贱的超强密码手（真的很喜欢犯贱）&#34;,&#34;tags&#34;:[&#34;ctf&#34;,&#34;crypto&#34;]},{&#34;name&#34;:&#34;Mother Ship&#34;,&#34;url&#34;:&#34;https://blog.mothership.top/&#34;,&#34;description&#34;:&#34;妈船，osu!老资历，计算机领域大神?!&#34;,&#34;tags&#34;:[&#34;osu!&#34;,&#34;engineering&#34;]}]"> <div id="terminal-output" class="terminal-output" aria-live="polite"></div> <form id="terminal-form" class="terminal-form" autocomplete="off"> <span id="terminal-prompt" class="terminal-prompt"></span> <input id="terminal-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus class="terminal-input" aria-label="terminal input"> </form> </div> </div> <
